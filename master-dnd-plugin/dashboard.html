<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>⚔ D&D Master Console</title>
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Cinzel:wght@400;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0a0a12; --panel:#0d0d1c; --card:#111128; --lift:#161630;
  --gold:#c9a227; --gold2:#e8c547; --gold-dim:#7a5f10; --gold-glow:rgba(201,162,39,.15);
  --blood:#7c1818; --blood-b:#c42b2b;
  --arcane:#2d1a5e; --arcane-b:#7c3aed; --arcane-light:#a78bfa;
  --forest:#1a3d1a; --forest-b:#22c55e;
  --ice:#1a3050; --ice-b:#60a5fa;
  --parchment:#e8d5b0; --ash:#7a7a8a; --muted:#4a4a5a;
  --hp-s:#15803d; --hp-w:#b45309; --hp-c:#b91c1c;
  --bdr:rgba(201,162,39,.15); --bdr-s:rgba(201,162,39,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  background:var(--ink);
  background-image:
    radial-gradient(ellipse at 15% 85%,rgba(45,26,94,.25) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 15%,rgba(124,24,24,.15) 0%,transparent 50%),
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5L35 25H55L40 38L45 58L30 45L15 58L20 38L5 25H25Z' fill='none' stroke='rgba(201,162,39,0.03)' stroke-width='1'/%3E%3C/svg%3E");
  color:var(--parchment);
  font-family:'EB Garamond',Georgia,serif;
  font-size:15px;
  display:flex;flex-direction:column;
}

/* Parchment noise overlay */
body::before{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.015) 3px,rgba(0,0,0,.015) 4px),
             repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(201,162,39,.005) 3px,rgba(201,162,39,.005) 4px)}

/* ── Typography ── */
.font-title{font-family:'Uncial Antiqua',serif}
.font-head{font-family:'Cinzel',serif}
.mono{font-family:'Share Tech Mono',monospace}
h2{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:4px;text-transform:uppercase;color:var(--gold-dim)}

/* ── Header ── */
.hdr{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:8px 18px;border-bottom:1px solid var(--bdr);
  background:linear-gradient(180deg,rgba(201,162,39,.06) 0%,transparent 100%)}
.hdr-title{display:flex;align-items:center;gap:12px}
.hdr-title h1{font-family:'Uncial Antiqua',serif;font-size:1.15rem;color:var(--gold);
  text-shadow:0 0 24px rgba(201,162,39,.4),0 0 60px rgba(201,162,39,.15);letter-spacing:2px}
.hdr-camp{font-family:'EB Garamond',serif;font-style:italic;color:var(--ash);font-size:.9rem}
.hdr-info{display:flex;gap:16px;align-items:center;font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--ash)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;animation:blink 2s infinite}
.dot.ok{background:var(--hp-s)}.dot.err{background:var(--blood-b)}.dot.warn{background:var(--hp-w)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Columns ── */
.cols{flex:1;display:grid;grid-template-columns:290px 1fr 320px;gap:1px;background:var(--bdr);overflow:hidden;min-height:0}
.col{background:var(--panel);display:flex;flex-direction:column;overflow:hidden}

/* ── Section header ── */
.sec{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:7px 13px;border-bottom:1px solid var(--bdr);background:rgba(0,0,0,.2)}
.chip{font-family:'Cinzel',serif;font-size:.58rem;font-weight:700;
  color:var(--ink);background:var(--gold);padding:2px 8px;border-radius:2px;letter-spacing:1px}
.chip.blue{background:var(--ice-b);color:var(--ink)}

/* ════════════════════════════════════
   LEFT — PARTY
════════════════════════════════════ */
.party-scroll{flex:1;overflow-y:auto;padding:10px}
.party-scroll::-webkit-scrollbar{width:3px}
.party-scroll::-webkit-scrollbar-thumb{background:var(--bdr-s);border-radius:2px}

.pcard{background:var(--card);border:1px solid var(--bdr);border-radius:6px;
  margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.pcard:hover{border-color:var(--bdr-s)}
.pcard-top{display:flex;gap:10px;padding:10px 10px 8px}
.pcard-portrait{width:60px;height:84px;flex-shrink:0;border-radius:4px;overflow:hidden;
  border:1px solid var(--bdr-s);background:var(--arcane)}
.pcard-portrait svg{width:100%;height:100%}
.pcard-meta{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.pcard-name{font-family:'Cinzel',serif;font-weight:700;font-size:.85rem;color:var(--parchment);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard-class{font-size:.68rem;color:var(--ash);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard-badges{display:flex;gap:4px;flex-wrap:wrap}
.badge{font-family:'Share Tech Mono',monospace;font-size:.5rem;padding:1px 5px;
  border-radius:2px;white-space:nowrap}
.badge.gold{background:rgba(201,162,39,.12);color:var(--gold);border:1px solid rgba(201,162,39,.25)}
.badge.blue{background:rgba(96,165,250,.1);color:var(--ice-b);border:1px solid rgba(96,165,250,.25)}
.badge.green{background:rgba(34,197,94,.1);color:var(--forest-b);border:1px solid rgba(34,197,94,.25)}

.hp-section{padding:0 10px 8px}
.hp-row{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.hp-bar{flex:1;height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.hp-fill{height:100%;border-radius:3px;transition:width .5s,background .5s}
.hp-fill.w{background:var(--hp-w)}.hp-fill.c{background:var(--hp-c);animation:crit 1s infinite}
@keyframes crit{0%,100%{box-shadow:0 0 5px var(--hp-c)}50%{box-shadow:none}}
.hp-text{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--ash);white-space:nowrap}

.stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;padding:0 10px 8px}
.stat{display:flex;flex-direction:column;align-items:center;
  background:rgba(255,255,255,.025);border-radius:3px;padding:3px 2px}
.stat-v{font-family:'Cinzel',serif;font-size:.72rem;font-weight:700;color:var(--gold)}
.stat-k{font-size:.42rem;color:var(--ash);text-transform:uppercase;letter-spacing:.5px}

.inv-section{border-top:1px solid var(--bdr);padding:6px 10px 8px}
.inv-title{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:3px;
  color:var(--gold-dim);text-transform:uppercase;margin-bottom:5px}
.inv-items{display:flex;flex-direction:column;gap:2px}
.inv-item{font-size:.68rem;color:var(--ash);line-height:1.4;
  padding-left:10px;position:relative;font-family:'EB Garamond',serif}
.inv-item::before{content:'◆';position:absolute;left:0;color:var(--gold-dim);font-size:.45rem;top:2px}
.inv-item.special{color:var(--gold);font-style:italic}

.quest-section{border-top:1px solid var(--bdr);padding:6px 10px 8px}
.quest-item{font-size:.68rem;color:var(--arcane-light);font-style:italic;line-height:1.4;
  padding-left:10px;position:relative}
.quest-item::before{content:'◈';position:absolute;left:0;color:var(--arcane-b);font-size:.45rem;top:2px}

/* Equipment / quest collapsible toggle */
.inv-toggle{width:100%;background:none;border:none;cursor:pointer;
  display:flex;align-items:center;gap:6px;padding:0 0 4px;
  font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:3px;
  color:var(--gold-dim);text-transform:uppercase;text-align:left}
.inv-toggle:hover{color:var(--gold)}
.inv-toggle:hover .inv-arrow{color:var(--gold)}
.inv-arrow{font-size:.65rem;transition:transform .15s;line-height:1;color:var(--gold-dim)}
.inv-count{font-size:.44rem;opacity:.55;margin-left:auto;font-style:normal;letter-spacing:0}

/* ════════════════════════════════════
   CENTER — SCENE PANEL
════════════════════════════════════ */
.scene-wrap{display:flex;flex-direction:column;gap:12px;padding:2px}
.scene-location{text-align:center;padding:20px 16px 16px;
  background:linear-gradient(180deg,rgba(201,162,39,.07) 0%,transparent 100%);
  border:1px solid var(--bdr);border-radius:8px}
.scene-loc-icon{font-size:1.5rem;margin-bottom:6px;opacity:.65}
.scene-loc-name{font-family:'Cinzel',serif;font-size:.95rem;font-weight:700;
  color:var(--gold);letter-spacing:2px;
  text-shadow:0 0 20px rgba(201,162,39,.25)}
.scene-tempo{font-size:.68rem;color:var(--ash);font-style:italic;margin-top:5px;letter-spacing:.5px}
.scene-section{background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:10px 12px}
.scene-sec-title{font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:3px;
  color:var(--gold-dim);text-transform:uppercase;margin-bottom:8px}
.scene-npc{font-size:.75rem;color:var(--parchment);padding:4px 0 4px 14px;position:relative;
  border-bottom:1px solid rgba(201,162,39,.05);line-height:1.4}
.scene-npc::before{content:'◆';position:absolute;left:0;color:var(--gold-dim);font-size:.4rem;top:6px}
.scene-npc:last-child{border-bottom:none}
.scene-npc-stato{font-size:.62rem;color:var(--ash);font-style:italic;margin-left:5px}
.scene-trama{padding:5px 0;border-bottom:1px solid rgba(201,162,39,.05)}
.scene-trama:last-child{border-bottom:none}
.scene-trama-k{font-family:'Share Tech Mono',monospace;font-size:.56rem;
  color:var(--gold-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.scene-trama-v{font-size:.72rem;color:var(--arcane-light);font-style:italic;line-height:1.45}

/* ════════════════════════════════════
   CENTER — DYNAMIC PANEL
════════════════════════════════════ */
.center-scroll{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:12px}
.center-scroll::-webkit-scrollbar{width:3px}
.center-scroll::-webkit-scrollbar-thumb{background:var(--bdr-s);border-radius:2px}

/* ── Portraits (no combat) ── */
.portraits-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.portrait-panel{background:var(--card);border:1px solid var(--bdr);border-radius:8px;
  overflow:hidden;position:relative;transition:all .3s}
.portrait-panel:hover{border-color:var(--bdr-s);transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,.4)}
.portrait-panel svg{width:100%;height:auto;display:block}
.portrait-label{padding:8px 10px;border-top:1px solid var(--bdr)}
.portrait-name{font-family:'Cinzel',serif;font-size:.8rem;font-weight:700;color:var(--parchment)}
.portrait-sub{font-size:.65rem;color:var(--ash);margin-top:1px}
.portrait-hp{margin-top:5px;display:flex;align-items:center;gap:7px}
.portrait-hp-bar{flex:1;height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
.portrait-hp-fill{height:100%;border-radius:2px;transition:width .5s,background .5s}
.portrait-hp-val{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--ash)}

.no-party{display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;gap:8px;color:var(--muted);font-style:italic;font-size:.9rem}
.no-party-rune{font-family:'Uncial Antiqua',serif;font-size:3rem;color:var(--bdr);line-height:1}

/* ── Combat (active) ── */
.combat-wrap{display:flex;flex-direction:column;gap:12px}
.init-list{display:flex;flex-direction:column;gap:5px}
.irow{display:grid;grid-template-columns:14px 26px 1fr auto;align-items:center;gap:7px;
  padding:8px 10px;background:var(--lift);border:1px solid transparent;border-radius:4px;
  transition:all .2s;position:relative;overflow:hidden}
.irow::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:background .2s}
.irow.act{border-color:var(--bdr-s);background:rgba(201,162,39,.07);box-shadow:0 0 12px rgba(201,162,39,.08)}
.irow.act::before{background:var(--gold)}
.irow.dead{opacity:.35}
.iarrow{font-size:.55rem;color:var(--gold)}
.iemoji{font-size:1rem;text-align:center;line-height:1}
.iinfo{min-width:0}
.iname{font-family:'Cinzel',serif;font-size:.72rem;font-weight:600;color:var(--parchment);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.isub{display:flex;gap:5px;margin-top:2px;align-items:center}
.tbadge{font-family:'Share Tech Mono',monospace;font-size:.46rem;padding:1px 4px;
  border-radius:2px;text-transform:uppercase;letter-spacing:1px}
.tbadge.giocatore{background:rgba(96,165,250,.15);color:var(--ice-b);border:1px solid rgba(96,165,250,.25)}
.tbadge.mostro{background:rgba(196,43,43,.15);color:#e06060;border:1px solid rgba(196,43,43,.25)}
.tbadge.compagno{background:rgba(34,197,94,.15);color:var(--forest-b);border:1px solid rgba(34,197,94,.25)}
.ihpr{display:flex;flex-direction:column;align-items:flex-end;gap:2px;min-width:50px}
.ihpv{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--ash)}
.minibar{width:48px;height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
.minifill{height:100%;border-radius:2px;transition:width .4s,background .4s}

.cgrid-wrap{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap}
.cgrid{display:grid;border:1px solid var(--bdr-s);border-radius:4px;overflow:hidden;
  box-shadow:inset 0 0 20px rgba(0,0,0,.3),0 0 20px rgba(201,162,39,.04)}
.gcell{width:46px;height:46px;display:flex;align-items:center;justify-content:center;
  border-right:1px solid rgba(201,162,39,.06);border-bottom:1px solid rgba(201,162,39,.06);
  font-size:1.3rem;position:relative;cursor:default;transition:background .12s;background:var(--ink)}
.gcell:hover{background:rgba(201,162,39,.04)}
.gcell.tok{background:rgba(201,162,39,.03)}
.gcell.act{background:rgba(201,162,39,.1);box-shadow:inset 0 0 10px rgba(201,162,39,.12)}
.gcell.act::after{content:'';position:absolute;inset:2px;border:1px solid rgba(201,162,39,.4);
  border-radius:3px;pointer-events:none;animation:glow 1.5s infinite}
@keyframes glow{0%,100%{border-color:rgba(201,162,39,.35)}50%{border-color:rgba(201,162,39,.8)}}
.gcoord{position:absolute;bottom:1px;right:2px;font-size:.34rem;
  color:rgba(201,162,39,.15);font-family:'Share Tech Mono',monospace}
.gleg{display:flex;flex-direction:column;gap:4px;padding:8px;
  background:var(--card);border:1px solid var(--bdr);border-radius:4px;min-width:120px}
.gleg-t{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:3px;
  color:var(--gold-dim);text-transform:uppercase;margin-bottom:2px}
.gleg-r{display:flex;align-items:center;gap:6px;font-size:.66rem;color:var(--ash)}
.gleg-e{font-size:.9rem;width:16px;text-align:center}
.gleg-b{flex:1;height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
.gleg-f{height:100%;border-radius:2px}

/* ════════════════════════════════════
   RIGHT — CHAT
════════════════════════════════════ */
.chat-status{flex-shrink:0;padding:3px 12px;border-bottom:1px solid var(--bdr);
  font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--ash);display:flex;gap:6px;align-items:center}
.chat-msgs{flex:1;overflow-y:auto;padding:10px 10px 4px;display:flex;flex-direction:column;gap:10px}
.chat-msgs::-webkit-scrollbar{width:3px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--bdr-s);border-radius:2px}

/* Narrazione GM */
.narr-block{font-style:italic;color:rgba(232,213,176,.68);font-size:.83rem;line-height:1.7;
  border-left:2px solid rgba(201,162,39,.18);padding-left:10px;margin-left:2px}
.narr-block strong{color:var(--gold);font-style:normal}
.narr-block em{color:var(--arcane-light)}

/* Portrait bubble */
.rpg-bubble{display:flex;gap:9px;align-items:flex-start;
  border:1px solid var(--bdr);border-left:3px solid var(--gold);
  border-radius:0 6px 6px 0;padding:9px 11px;background:var(--card)}
.rpg-bubble.npc{border-left-color:#c42b2b;background:rgba(124,24,24,.06)}
.rpg-bubble.gm-direct{border-left-color:var(--arcane-b);background:rgba(45,26,94,.1)}
.rpg-bubble.player{flex-direction:row-reverse;
  border-left:1px solid var(--bdr);border-right:3px solid var(--ice-b);
  border-radius:6px 0 0 6px;background:rgba(26,48,80,.35)}
.rp-portrait{width:42px;height:54px;flex-shrink:0;border-radius:4px;
  border:1px solid var(--bdr-s);object-fit:cover;display:block}
.rp-emoji-fallback{width:42px;height:54px;flex-shrink:0;border-radius:4px;
  border:1px solid var(--bdr-s);display:none;align-items:center;justify-content:center;
  font-size:1.5rem;background:rgba(45,26,94,.35)}
.rpg-bubble.npc .rp-emoji-fallback{background:rgba(124,24,24,.3)}
.rpg-bubble.player .rp-emoji-fallback{background:rgba(26,48,80,.5)}
.rp-body{flex:1;min-width:0}
.rp-name{font-family:'Cinzel',serif;font-size:.57rem;letter-spacing:2px;
  text-transform:uppercase;color:var(--gold);margin-bottom:3px}
.rpg-bubble.npc .rp-name{color:#e06060}
.rpg-bubble.gm-direct .rp-name{color:var(--arcane-light)}
.rpg-bubble.player .rp-name{color:var(--ice-b);text-align:right}
.rp-text{font-size:.83rem;line-height:1.6;font-family:'EB Garamond',serif}
.rpg-bubble.player .rp-text{text-align:right}
.rp-text strong{color:var(--gold)}.rp-text em{color:var(--arcane-light)}
.rp-text code{font-family:'Share Tech Mono',monospace;font-size:.78rem;
  background:rgba(255,255,255,.06);padding:1px 5px;border-radius:3px;color:var(--forest-b)}
.rp-text h1,.rp-text h2,.rp-text h3{font-family:'Cinzel',serif;color:var(--gold);margin:5px 0 2px}
.rp-text ul,.rp-text ol{padding-left:16px;margin:3px 0}.rp-text li{margin:1px 0}
.rp-text p{margin:2px 0}.rp-text p:first-child{margin-top:0}.rp-text p:last-child{margin-bottom:0}
.rp-text blockquote{border-left:2px solid var(--gold-dim);padding-left:8px;
  color:var(--ash);font-style:italic;margin:3px 0}
.rp-text hr{border:none;border-top:1px solid var(--bdr);margin:5px 0}
.rp-text table{width:100%;border-collapse:collapse;font-size:.75rem;margin:4px 0}
.rp-text td,.rp-text th{border:1px solid var(--bdr);padding:3px 7px}
.rp-text th{background:rgba(201,162,39,.08);color:var(--gold);font-family:'Cinzel',serif;font-size:.65rem}

/* Typing indicator */
.typing-ind{font-family:'Share Tech Mono',monospace;font-size:.7rem;
  color:var(--gold);align-self:flex-start;padding:4px 8px;animation:tb 1s infinite}
@keyframes tb{0%,100%{opacity:.35}50%{opacity:1}}

/* Chat footer */
.chat-footer{flex-shrink:0;padding:8px 10px;border-top:1px solid var(--bdr);display:flex;gap:7px;align-items:flex-end}
.chat-footer textarea{flex:1;background:var(--lift);border:1px solid var(--bdr);border-radius:4px;
  color:var(--parchment);font-family:'EB Garamond',serif;font-size:.85rem;
  padding:7px 9px;resize:none;outline:none;min-height:36px;max-height:120px;
  line-height:1.5;transition:border-color .2s}
.chat-footer textarea::placeholder{color:var(--muted)}
.chat-footer textarea:focus{border-color:var(--bdr-s)}
.send-btn{flex-shrink:0;background:rgba(201,162,39,.12);color:var(--gold);
  border:1px solid rgba(201,162,39,.3);border-radius:4px;padding:7px 12px;
  cursor:pointer;font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:1px;
  transition:all .2s;white-space:nowrap}
.send-btn:hover{background:var(--gold);color:var(--ink)}
.send-btn:disabled{opacity:.35;cursor:not-allowed}

/* Portrait edit button */
.pcard-portrait-wrap{position:relative;width:60px;flex-shrink:0}
.portrait-edit-btn{position:absolute;bottom:3px;right:3px;width:18px;height:18px;
  border-radius:50%;background:rgba(201,162,39,.9);color:var(--ink);border:1px solid var(--ink);
  display:flex;align-items:center;justify-content:center;font-size:.6rem;
  cursor:pointer;line-height:1;padding:0;opacity:0;transition:opacity .2s}
.pcard-portrait-wrap:hover .portrait-edit-btn{opacity:1}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-title">
    <h1 class="hdr-title">⚔ Master Console</h1>
    <span id="cname" class="hdr-camp"></span>
  </div>
  <div class="hdr-info">
    <span class="mono" id="tinfo">—</span>

/* ─── Utilities ─── */
function uuid(){return crypto.randomUUID?crypto.randomUUID():Math.random().toString(36).slice(2)+Date.now().toString(36)}
function pct(c,m){return m>0?Math.max(0,Math.min(100,c/m*100)):0}
function hbg(c,m){const p=pct(c,m);return p>50?'var(--hp-s)':p>25?'var(--hp-w)':'var(--hp-c)'}
function hcls(c,m){const p=pct(c,m);return p>50?'':'w'}
function defEmoji(t){return t==='giocatore'?'🧙':t==='compagno'?'🛡️':'⚔️'}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

/* ─── Markdown Parser ─── */
function md(raw){
  if(!raw)return '';
  // Escape HTML
  let s=raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Tables (simple: | a | b |)
  s=s.replace(/^\|(.+)\|\s*\n\|[-: |]+\|\s*\n((?:\|.+\|\s*\n?)*)/gm,(m,hdr,rows)=>{
    const ths=hdr.split('|').map(c=>`<th>${c.trim()}</th>`).join('');
    const trs=rows.trim().split('\n').map(r=>`<tr>${r.split('|').filter((_,i,a)=>i>0&&i<a.length-1).map(c=>`<td>${c.trim()}</td>`).join('')}</tr>`).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
  });
  // Blockquote
  s=s.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  // Headers
  s=s.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  s=s.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  s=s.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  // HR
  s=s.replace(/^---+$/gm,'<hr>');
  // Bold+italic, bold, italic
  s=s.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\*(.+?)\*/g,'<em>$1</em>');
  s=s.replace(/__(.+?)__/g,'<strong>$1</strong>');
  s=s.replace(/_(.+?)_/g,'<em>$1</em>');
  // Code
  s=s.replace(/`(.+?)`/g,'<code>$1</code>');
  // Ordered lists
  s=s.replace(/^\d+\. (.+)$/gm,'<li data-ol>$1</li>');
  // Unordered lists
  s=s.replace(/^[-*+] (.+)$/gm,'<li>$1</li>');
  // Wrap consecutive <li> in <ul> or <ol>
  s=s.replace(/((?:<li[^>]*>.*<\/li>\n?)+)/g,blk=>{
    const isOl=blk.includes('data-ol');
    const tag=isOl?'ol':'ul';
    return `<${tag}>${blk.replace(/ data-ol/g,'')}</${tag}>`;
  });
  // Paragraphs
  const parts=s.split(/\n\n+/);
  s=parts.map(p=>{
    p=p.trim();
    if(!p)return '';
    if(/^<(h[1-6]|ul|ol|li|hr|table|blockquote)/.test(p))return p;
    return `<p>${p.replace(/\n/g,'<br>')}</p>`;
  }).join('\n');
  return s;
}

/* Default SVG for unknown classes */
function getPortraitSvg(classe,razza){
  const cl=(classe||'').toLowerCase().trim();
  const key=Object.keys(CLASS_SVG).find(k=>cl.includes(k));
  if(key)return CLASS_SVG[key];
  // Generic fallback
  const colors={
    '--obs':'#0a0a12','--gold':'#c9a227','--bone':'#e8d5b0'
  };
  return `<svg viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">
    <rect width="200" height="260" fill="#0d0d1c"/>
    <text x="100" y="130" text-anchor="middle" font-size="60" fill="#c9a227" opacity=".6">⚔</text>
    <text x="100" y="180" text-anchor="middle" font-size="14" fill="#7a7a8a" font-family="Cinzel,serif">${esc(classe||'?')}</text>
  </svg>`;
}

/* ─── Party rendering ─── */
const equipOpen=new Set();
let lastChars=null;
function toggleSection(key,store){
  if(store.has(key))store.delete(key);else store.add(key);
  if(lastChars)renderParty(lastChars);
}

function renderParty(chars){
  lastChars=chars;
  const el=document.getElementById('party');
  if(!chars||!Object.keys(chars).length){
    el.innerHTML='<div class="no-party"><div class="no-party-rune">⚜</div><span>Nessun personaggio</span></div>';
    return;
  }
  el.innerHTML=Object.entries(chars).map(([k,c])=>{
    const n=c.nome||k,cl=c.classe||'',ra=c.razza||'',lv=c.livello;
    const hp=c.hp||{},has=hp.max!=null,p=has?pct(hp.correnti,hp.max):100;
    const stats=Object.entries(c.stats||{}).slice(0,6);
    const inv=Array.isArray(c.inventario)?c.inventario:[];
    const quests=Array.isArray(c.quest_attive)?c.quest_attive:[];
    const hbgColor=has?hbg(hp.correnti,hp.max):'var(--hp-s)';
    const hcls2=has?hcls(hp.correnti,hp.max):'';
    return `<div class="pcard">
      <div class="pcard-top">
        <div class="pcard-portrait">${getPortraitSvg(cl,ra)}</div>
        <div class="pcard-meta">
          <div class="pcard-name">${esc(n)}</div>
          <div class="pcard-class">${esc([cl,ra].filter(Boolean).join(' · '))}</div>
          <div class="pcard-badges">
            ${lv?`<span class="badge gold">Lv.${lv}</span>`:''}
            ${c.ca!=null?`<span class="badge blue">CA ${c.ca}</span>`:''}
            ${c.giocatore?`<span class="badge green">${esc(c.giocatore)}</span>`:''}
          </div>
          ${has?`<div style="margin-top:5px">
            <div class="hp-row">
              <div class="hp-bar"><div class="hp-fill ${hcls2}" style="width:${p}%;background:${hbgColor}"></div></div>
              <span class="hp-text">${hp.correnti}/${hp.max}</span>
            </div>
          </div>`:''}
        </div>
      </div>
      ${stats.length?`<div class="stats-row">${stats.map(([sk,sv])=>`<div class="stat"><div class="stat-v">${sv}</div><div class="stat-k">${esc(sk)}</div></div>`).join('')}</div>`:''}
      ${inv.length?`<div class="inv-section">
        <button class="inv-toggle" onclick="toggleSection('eq_${k.replace(/'/g,'_')}',equipOpen)">
          <span class="inv-arrow">${equipOpen.has('eq_'+k)?'▾':'▸'}</span>Equipaggiamento<span class="inv-count">${inv.length} oggetti</span>
        </button>
        ${equipOpen.has('eq_'+k)?`<div class="inv-items">${inv.map((item,i)=>`<div class="inv-item ${i<3?'special':''}">${esc(item)}</div>`).join('')}</div>`:''}
      </div>`:''}
      ${quests.length?`<div class="quest-section">
        <button class="inv-toggle" onclick="toggleSection('q_${k.replace(/'/g,'_')}',equipOpen)" style="color:var(--arcane-light)">
          <span class="inv-arrow" style="color:var(--arcane-b)">${equipOpen.has('q_'+k)?'▾':'▸'}</span>Quest attive<span class="inv-count">${quests.length}</span>
        </button>
        ${equipOpen.has('q_'+k)?quests.map(q=>`<div class="quest-item">${esc(q)}</div>`).join(''):''}
      </div>`:''}
    </div>`;
  }).join('');
}

function renderPortraits(chars){
  if(!chars||!Object.keys(chars).length){
    return `<div class="no-party" style="min-height:200px"><div class="no-party-rune">✦</div><span>Nessun personaggio nella campagna</span></div>`;
  }
  const cards=Object.entries(chars).map(([k,c])=>{
    const n=c.nome||k,cl=c.classe||'',ra=c.razza||'';
    const hp=c.hp||{},has=hp.max!=null,p=has?pct(hp.correnti,hp.max):100;
    const hbgColor=has?hbg(hp.correnti,hp.max):'var(--hp-s)';
    return `<div class="portrait-panel">
      ${getPortraitSvg(cl,ra)}
      <div class="portrait-label">
        <div class="portrait-name">${esc(n)}</div>
        <div class="portrait-sub">${esc([cl,ra,c.livello?'Lv.'+c.livello:''].filter(Boolean).join(' · '))}</div>
        ${has?`<div class="portrait-hp">

}

/* ─── Center Panel: Scene ─── */
function renderScene(state){
  const mondo=state.mondo||{};
  const loc=mondo.locazione||'Luogo sconosciuto';
  const tempo=mondo.tempo||'';
  const rawNpcs=Array.isArray(mondo.npcs_incontrati)?mondo.npcs_incontrati:[];
  const trame=typeof mondo.stato_trame==='object'&&mondo.stato_trame?mondo.stato_trame:{};
  const trameEntries=Object.entries(trame).filter(([,v])=>v);
  const npcItems=rawNpcs.filter(Boolean).map(n=>{
    if(typeof n==='string')return{nome:n,stato:''};
    return{nome:n.nome||n.name||'?',stato:n.stato||n.ruolo||''};
  });
  return `<div class="scene-wrap">
    <div class="scene-location">
      <div class="scene-loc-icon">🗺</div>
      <div class="scene-loc-name">${esc(loc)}</div>
      ${tempo?`<div class="scene-tempo">${esc(tempo)}</div>`:''}
    </div>
    ${npcItems.length?`<div class="scene-section">
      <div class="scene-sec-title">Personaggi in scena</div>
      ${npcItems.map(n=>`<div class="scene-npc">${esc(n.nome)}${n.stato?`<span class="scene-npc-stato">${esc(n.stato)}</span>`:''}</div>`).join('')}
    </div>`:''}
    ${trameEntries.length?`<div class="scene-section">
      <div class="scene-sec-title">Trame attive</div>
      ${trameEntries.map(([k,v])=>`<div class="scene-trama"><div class="scene-trama-k">${esc(k)}</div><div class="scene-trama-v">${esc(typeof v==='string'?v:JSON.stringify(v))}</div></div>`).join('')}
    </div>`:''}
  </div>`;
}

/* ─── Center Panel: Combat ─── */
function renderCombat(comb,chars){
  if(!comb?.attivo||!comb.ordine_iniziativa?.length){
    return `<div class="no-party"><div class="no-party-rune">⚔</div><span>Nessun combattimento attivo</span></div>`;
  }
  const combattenti=comb.ordine_iniziativa;
  // Initiative list
  let html='<div class="combat-wrap"><div class="init-list">';
  combattenti.forEach((c,i)=>{
    const act=i===comb.indice_corrente,hp=c.hp||{},has=hp.max!=null,pp=has?pct(hp.correnti,hp.max):100,dead=has&&hp.correnti===0;
    const em=c.emoji||defEmoji(c.tipo),bg=has?hbg(hp.correnti,hp.max):'var(--hp-s)';
    html+=`<div class="irow ${act?'act':''} ${dead?'dead':''}">
      <span class="iarrow">${act?'▶':''}</span>
      <span class="iemoji">${dead?'💀':em}</span>
      <div class="iinfo">
        <div class="iname">${esc(c.nome)}</div>
        <div class="isub"><span class="tbadge ${esc(c.tipo)}">${esc(c.tipo)}</span><span class="mono" style="font-size:.5rem;color:var(--ash)">ini ${c.iniziativa}</span></div>
      </div>
      ${has?`<div class="ihpr"><span class="ihpv">${hp.correnti}/${hp.max}</span><div class="minibar"><div class="minifill" style="width:${pp}%;background:${bg}"></div></div></div>`:''}
    </div>`;
  });
  html+='</div>';
  // Grid
  const cellMap={};
  combattenti.forEach((c,i)=>{
    const x=c.x!=null?c.x:i%W,y=c.y!=null?c.y:Math.floor(i/W);
    if(x>=0&&x<W&&y>=0&&y<H){const key=x+','+y;if(!cellMap[key])cellMap[key]=[];cellMap[key].push({...c,_i:i})}
  });
  html+=`<div class="cgrid-wrap"><div><div class="cgrid" style="grid-template-columns:repeat(${W},46px)">`;
  for(let r=0;r<H;r++)for(let col=0;col<W;col++){
    const key=col+','+r,toks=cellMap[key]||[],t=toks[0],act=toks.some(x=>x._i===comb.indice_corrente);
    const em=t?(t.emoji||defEmoji(t.tipo)):'',dead=t&&t.hp&&t.hp.correnti===0;
    html+=`<div class="gcell ${toks.length?'tok':''} ${act?'act':''}" title="${t?esc(t.nome)+(t.hp?' · HP '+t.hp.correnti+'/'+t.hp.max:''):col+','+r}">${t?(dead?'<span style="opacity:.3">💀</span>':em):''}${toks.length>1?`<span style="position:absolute;top:1px;right:2px;font-size:.38rem;color:var(--gold);font-family:'Share Tech Mono'">${toks.length}</span>`:''}<span class="gcoord">${col},${r}</span></div>`;
  }
  html+=`</div></div><div class="gleg"><div class="gleg-t">Token</div>`;
  combattenti.forEach((c,i)=>{
    const act=i===comb.indice_corrente,hp=c.hp||{},has=hp.max!=null,pp=has?pct(hp.correnti,hp.max):100,bg=has?hbg(hp.correnti,hp.max):'var(--hp-s)';
    html+=`<div class="gleg-r"><span class="gleg-e">${c.emoji||defEmoji(c.tipo)}</span><span style="flex:1;font-size:.64rem;${act?'color:var(--gold)':''}">${esc(c.nome)}</span>${has?`<div class="gleg-b"><div class="gleg-f" style="width:${pp}%;background:${bg}"></div></div>`:''}</div>`;
  });
  html+=`</div></div></div>`;
  return html;
}

/* ─── State polling ─── */
async function pollState(){
  try{
    const r=await fetch(`http://localhost:${DASH_PORT}/api/state`,{signal:AbortSignal.timeout(2500)});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const{state}=await r.json();
    document.getElementById('sdot').className='dot ok';
    document.getElementById('slabel').textContent='Stato OK';
    document.getElementById('cname').textContent=state.titolo||'';
    document.getElementById('tinfo').textContent='Turno '+(state.turno||0)+' · '+(state.sistema||'dnd5e');
    renderParty(state.personaggi||{});
    // Dynamic center
    const comb=state.combattimento;
    const inCombat=comb?.attivo&&comb.ordine_iniziativa?.length>0;
    const centerEl=document.getElementById('center');
    const labelEl=document.getElementById('center-label');
    const chipEl=document.getElementById('rchip');
    if(inCombat){
      labelEl.textContent='Combattimento';
      chipEl.style.display='';
      chipEl.textContent='RND '+comb.round;
      centerEl.innerHTML=renderCombat(comb,state.personaggi);
    }else{
      labelEl.textContent='Scenario';
      chipEl.style.display='none';
      centerEl.innerHTML=renderScene(state);
    }
  }catch(e){
    document.getElementById('sdot').className='dot err';
    document.getElementById('slabel').textContent='Offline: '+e.message;
  }
}

function msgId(m){
  return m.__openclaw?.id || m.idempotencyKey || (m.role+':'+JSON.stringify(m.content).slice(0,120));

function processHistoryUpdate(messages){
  const raw=(messages||[]).filter(m=>m.role==='user'||m.role==='assistant');
  let added=0;
  raw.forEach(m=>{
    const id=msgId(m);
    if(shownMsgIds.has(id))return;
    shownMsgIds.add(id);
    const txt=typeof m.content==='string'?m.content:(Array.isArray(m.content)?m.content.filter(b=>b.type==='text').map(b=>b.text).join('\n\n'):'');
    if(!txt)return;
    const rendered=m.role==='user'?esc(txt):md(txt);
    if(m.role==='user'&&skipNextUserMsg===rendered){skipNextUserMsg=null;return;}
    appendMsg(m.role==='user'?'user':'gm',rendered);
    added++;
  });
  console.log('[CHAT] update shown='+shownMsgIds.size+' raw='+raw.length+' added='+added);
  if(added>0)hideTyping();
}

function refreshChat(){
  const sent=wsReady?!!wsSend('chat.history',{sessionKey:SESSION_KEY,limit:200}):false;
  console.log('[CHAT] refresh wsReady='+wsReady+' wsSent='+sent);
  fetch('/api/chat').then(r=>r.json()).then(data=>{
    processHistoryUpdate(data.messages||[]);
  }).catch(e=>console.error('[CHAT] fetch error:',e));
}

function appendMsg(role,htmlContent){
  if(!htmlContent||!htmlContent.trim())return;
  const el=document.getElementById('chatmsgs');
  const d=document.createElement('div');
  if(role==='user'){
    d.className='rpg-bubble player';
    d.innerHTML=`<div class="rp-emoji-fallback">⚔</div><div class="rp-body"><div class="rp-name">TU</div><div class="rp-text">${htmlContent}</div></div>`;
  }else{
    d.className='rpg-bubble gm-direct';
    d.innerHTML=`<div class="rp-emoji-fallback">🎲</div><div class="rp-body"><div class="rp-name">GAME MASTER</div><div class="rp-text">${htmlContent}</div></div>`;
  }
  el.appendChild(d);
  scrollChat();
  msgs.push({role,htmlContent});
}

function showTyping(){
  const el=document.getElementById('chatmsgs');
  typingEl=document.createElement('div');
  typingEl.className='typing-ind';
  typingEl.textContent='● ● ●';
  el.appendChild(typingEl);
  scrollChat();
}
function hideTyping(){if(typingEl){typingEl.remove();typingEl=null;}}

function handleGmChunk(text){
  hideTyping();
  if(!text)return;
  const el=document.getElementById('chatmsgs');
  gmBuffer+=text;
  if(!gmMsgEl){
    gmMsgEl=document.createElement('div');
    gmMsgEl.className='rpg-bubble gm-direct';
    gmMsgEl.innerHTML='<div class="rp-emoji-fallback">🎲</div><div class="rp-body"><div class="rp-name">GAME MASTER</div><div class="rp-text"></div></div>';
    el.appendChild(gmMsgEl);
  }
  gmMsgEl.querySelector('.rp-text').innerHTML=md(gmBuffer);
  scrollChat();
}
function flushGmMsg(){if(gmBuffer){msgs.push({role:'gm',htmlContent:md(gmBuffer)});}gmBuffer='';gmMsgEl=null;}

function wsSend(method,params){
  if(!ws||ws.readyState!==WebSocket.OPEN)return null;
  const id=uuid();
  ws.send(JSON.stringify({type:'req',id,method,params}));
  return id;
}
function connectWS(){
  if(ws&&(ws.readyState===WebSocket.OPEN||ws.readyState===WebSocket.CONNECTING))return;
  wsSetStatus('warn','Connessione...');
  try{ws=new WebSocket(WS_PROXY);}catch(e){wsSetStatus('err','WebSocket: '+e.message);return;}
  ws.onopen=()=>wsSetStatus('warn','Autenticazione...');
  ws.onmessage=(ev)=>{
    let data;try{data=JSON.parse(ev.data);}catch{return;}
    if(data.event==='proxy.connected'){wsReady=true;wsSetStatus('ok','Chat connessa');wsSend('chat.history',{sessionKey:SESSION_KEY,limit:200});return;}
    if(data.ok===true&&Array.isArray(data.payload?.messages)){console.log('[CHAT] ws history msgs='+data.payload.messages.length);processHistoryUpdate(data.payload.messages);return;}
  };
  ws.onclose=()=>{wsReady=false;wsSetStatus('err','Disconnesso — riconnessione...');setTimeout(connectWS,3000);};
  ws.onerror=()=>wsSetStatus('err','Errore proxy WS');
}

function sendChatMessage(text){
  if(!wsReady||!text.trim())return;
  const escaped=esc(text);
  appendMsg('user',escaped);
  skipNextUserMsg=escaped;
  wsSend('chat.send',{sessionKey:SESSION_KEY,message:text,idempotencyKey:uuid()});
  showTyping();
  const ta=document.getElementById('chatinput');
  ta.value='';ta.style.height='auto';
}

document.getElementById('chatsend').addEventListener('click',()=>sendChatMessage(document.getElementById('chatinput').value));
document.getElementById('chatinput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChatMessage(e.target.value);}});
document.getElementById('chatinput').addEventListener('input',e=>{e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,120)+'px';});

refreshChat();
setInterval(refreshChat,2500);
pollState();
setInterval(pollState,2500);
connectWS();
</script>
